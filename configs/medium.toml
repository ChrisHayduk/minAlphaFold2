# Medium profile — mid-sized, reasonable default for single-protein overfit
# experiments on CPU. Not paper-spec; picks channel/block counts that let
# the model actually learn small proteins in minutes rather than days.

model_profile = "medium"

# Channel dimensions (supplement 1.5).
c_m = 128
c_s = 192
c_z = 64
c_t = 64
c_e = 64

# Main MSA row / column attention (Algorithm 7, 8).
dim = 16
num_heads = 8

# MSA transition widening factor (Algorithm 9).
msa_transition_n = 4

# Outer product mean hidden dim (Algorithm 10).
outer_product_dim = 16

# Triangle multiplicative updates (Algorithms 11, 12).
triangle_mult_c = 64

# Triangle self-attention (Algorithms 13, 14).
triangle_dim = 16
triangle_num_heads = 4

# Pair transition widening factor (Algorithm 15).
pair_transition_n = 4

# Template pair stack (supplement 1.7.1, Algorithms 16, 17).
template_pair_num_blocks = 2
template_pair_dropout = 0.0
template_pointwise_attention_dim = 16
template_pointwise_num_heads = 4
template_triangle_mult_c = 32
template_triangle_attn_c = 32
template_triangle_attn_num_heads = 4
template_pair_transition_n = 2

# Extra MSA stack (supplement 1.7.2, Algorithms 18, 19).
extra_msa_dim = 8
extra_msa_dropout = 0.0
extra_pair_dropout = 0.0
msa_column_global_attention_dim = 8
num_extra_msa = 2

# Main Evoformer (Algorithm 6).
num_evoformer = 4
evoformer_msa_dropout = 0.0
evoformer_pair_dropout = 0.0

# Structure Module (supplement 1.8, Algorithm 20).
structure_module_c = 64
structure_module_layers = 4
structure_module_dropout_ipa = 0.0
structure_module_dropout_transition = 0.0
sidechain_num_channel = 64
sidechain_num_residual_block = 2
position_scale = 10.0
zero_init = true

# Invariant Point Attention (supplement 1.8.2, Algorithm 22).
ipa_num_heads = 8
ipa_c = 16
ipa_n_query_points = 4
ipa_n_value_points = 8

# Auxiliary heads.
n_dist_bins = 64        # distogram (supplement 1.9.8)
plddt_hidden_dim = 64   # pLDDT MLP hidden (supplement 1.9.6)
n_plddt_bins = 50       # pLDDT output bins (supplement 1.9.6)
n_msa_classes = 23      # masked MSA head (supplement 1.9.9)
n_pae_bins = 64         # PAE / pTM head (supplement 1.9.7)
